<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office → HTML Viewer</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
button { margin-right: 10px; padding: 8px 12px; }
#progressContainer { margin-top: 10px; height: 20px; width: 100%; background: #eee; border: 1px solid #ccc; border-radius: 4px; }
#progressBar { height: 100%; width: 0%; background: #4caf50; text-align: center; color: white; line-height: 20px; border-radius: 4px; }
#htmlContainer { margin-top: 20px; border: 1px solid #ccc; padding: 10px; max-height: 400px; overflow: auto; }
.slide { border: 1px dashed #666; margin-bottom: 10px; padding: 5px; }
table { border-collapse: collapse; width: 100%; }
td, th { border: 1px solid #333; padding: 5px; }
</style>
</head>
<body>
<h1>Office → HTML Viewer</h1>

<input type="file" id="fileInput" accept=".docx,.xlsx,.pptx"/>
<button id="convertBtn">Dönüştür</button>
<button id="viewBtn">Görüntüle</button>

<div id="progressContainer">
  <div id="progressBar">0%</div>
</div>

<div id="htmlContainer"></div>

<script type="module">
import { NodeJS } from 'capacitor-nodejs';
import { Filesystem, Directory } from '@capacitor/filesystem';

const fileInput = document.getElementById("fileInput");
const convertBtn = document.getElementById("convertBtn");
const viewBtn = document.getElementById("viewBtn");
const progressBar = document.getElementById("progressBar");
const htmlContainer = document.getElementById("htmlContainer");

let selectedFile = null;
let convertedHtml = "";

fileInput.addEventListener("change", (e) => {
    selectedFile = e.target.files[0];
    convertedHtml = "";
    progressBar.style.width = "0%";
    progressBar.textContent = "0%";
    htmlContainer.innerHTML = "";
});

convertBtn.addEventListener("click", async () => {
    if (!selectedFile) {
        alert("Lütfen bir dosya seçin!");
        return;
    }

    const file = selectedFile;

    // İlerleme bar simülasyonu
    for (let i = 1; i <= 100; i++) {
        await new Promise(res => setTimeout(res, 5));
        progressBar.style.width = i + "%";
        progressBar.textContent = i + "%";
    }

    // Dosya blob -> base64
    const reader = new FileReader();
    reader.onload = async (e) => {
        const base64Data = e.target.result.split(',')[1];

        try {
            // Dosyayı Android sandbox içine yaz
            const saved = await Filesystem.writeFile({
                path: file.name,
                data: base64Data,
                directory: Directory.Data
            });

            const filePath = saved.uri; // NodeJS Mobile için gerçek path

            // NodeJS Mobile ile dönüştür
            const result = await NodeJS.eval({
                script: `
                    const { convertOfficeToHtml } = require('www/nodejs/convert.js');
                    convertOfficeToHtml("${filePath}")
                `
            });

            convertedHtml = result.result;
            alert("Dönüştürme tamamlandı!");
        } catch (err) {
            alert("Dönüştürme hatası: " + err);
        }
    };
    reader.readAsDataURL(file);
});

viewBtn.addEventListener("click", () => {
    if (!convertedHtml) {
        alert("Henüz dosya dönüştürülmedi!");
        return;
    }
    htmlContainer.innerHTML = convertedHtml;
});
</script>
</body>
</html>
