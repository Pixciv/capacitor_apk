<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mobil PDF Reader</title>
<style>
body{margin:0;padding:12px;font-family:system-ui;display:flex;flex-direction:column;}
h2{margin-bottom:12px;}
#pdfInput{margin-bottom:12px;}
#list div{padding:12px;margin:6px 0;background:#eee;border-radius:8px;cursor:pointer;font-size:1rem;}
#list div:active{background:#ccc;}
</style>
</head>
<body>
<h2>PDF Reader</h2>
<input type="file" id="pdfInput" accept="application/pdf">
<div id="list"></div>

<script>
let pdfList = [];
const input = document.getElementById('pdfInput');
const listDiv = document.getElementById('list');

input.addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  pdfList.push(file);
  updateList();
});

function updateList() {
  listDiv.innerHTML = '';
  pdfList.forEach(file => {
    const div = document.createElement('div');
    div.textContent = file.name;
    div.addEventListener('click', ()=>viewPDF(file));
    listDiv.appendChild(div);
  });
}

function viewPDF(file) {
  const reader = new FileReader();
  reader.onload = function(event) {
    const base64String = btoa(new Uint8Array(event.target.result).reduce(
      (data, byte) => data + String.fromCharCode(byte), ''
    ));
    sessionStorage.setItem('pdfData', base64String);
    // web/viewer.html yolunu kullan
    window.open('web/viewer.html', '_blank');
  };
  reader.readAsArrayBuffer(file);
}
</script>
</body>
</html>
