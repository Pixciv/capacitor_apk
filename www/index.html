<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Reader Offline</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-book-open"></i> All Reader Offline</h1>
            <p>DOCX, PPTX, XLSX ve diğer ofis belgelerini PDF olarak görüntüleyin</p>
        </header>

        <div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <h3>Dosya Yükle</h3>
            <p>Dosyanızı sürükleyip bırakın veya tıklayarak seçin</p>
            <input type="file" id="fileInput" accept=".docx,.pptx,.xlsx,.doc,.ppt,.xls,.pdf">
        </div>

        <div class="conversion-status hidden" id="conversionStatus">
            <div class="spinner"></div>
            <p>Dosyanız dönüştürülüyor...</p>
        </div>

        <div class="viewer-container hidden" id="viewerContainer">
            <div class="toolbar">
                <button id="downloadBtn" class="toolbar-btn">
                    <i class="fas fa-download"></i> İndir
                </button>
                <button id="newFileBtn" class="toolbar-btn">
                    <i class="fas fa-plus"></i> Yeni Dosya
                </button>
            </div>
            <div id="pdfViewer"></div>
        </div>

        <div class="error-message hidden" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i>
            <p id="errorText"></p>
        </div>

        <div class="supported-formats">
            <h3>Desteklenen Formatlar</h3>
            <div class="format-list">
                <div class="format-item">
                    <i class="fas fa-file-word"></i>
                    <span>DOCX, DOC</span>
                </div>
                <div class="format-item">
                    <i class="fas fa-file-powerpoint"></i>
                    <span>PPTX, PPT</span>
                </div>
                <div class="format-item">
                    <i class="fas fa-file-excel"></i>
                    <span>XLSX, XLS</span>
                </div>
                <div class="format-item">
                    <i class="fas fa-file-pdf"></i>
                    <span>PDF</span>
                </div>
            </div>
        </div>
    </div>

    <!-- PDF.js kütüphaneleri -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
