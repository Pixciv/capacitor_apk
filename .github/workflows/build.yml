name: Capacitor Android Full Project & Artifact v4

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Repo çek
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Node.js kurulumu
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Bağımlılıkları yükle
      - name: Install dependencies
        run: npm install --force

      # 4️⃣ Capacitor CLI güncel
      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli@latest

      # 5️⃣ Capacitor config oluştur (varsa atla)
      - name: Create capacitor.config.json if missing
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            echo '{
              "appId": "com.arvinapp.pdfreader",
              "appName": "PDF Reader",
              "webDir": "www",
              "bundledWebRuntime": false
            }' > capacitor.config.json
          else
            echo "capacitor.config.json mevcut."
          fi

      # 6️⃣ Minimal www oluştur (varsa atla)
      - name: Create minimal www if missing
        run: |
          if [ ! -d "www" ]; then
            mkdir www
            echo '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PDF Reader</title></head><body><h1>PDF Reader App</h1><p>Welcome to your Capacitor Android app!</p></body></html>' > www/index.html
          else
            echo "www dizini mevcut."
          fi

      # 7️⃣ Android platformunu ekle (yoksa)
      - name: Add Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platformu zaten mevcut."
          fi

      # 8️⃣ Web içeriğini Android’e kopyala
      - name: Copy web to Android
        run: npx cap copy android

      # 9️⃣ Android Debug APK üret
      - name: Build Android Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      # 🔟 Debug APK’yı Artifact olarak yükle
      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # 1️⃣1️⃣ Tüm proje klasörünü zipleyip artifact olarak yükle
      - name: Zip entire project
        run: zip -r capacitor_full_project.zip . -x "**/node_modules/*" "**/.git/*"
      - name: Upload full project artifact
        uses: actions/upload-artifact@v4
        with:
          name: capacitor-full-project
          path: capacitor_full_project.zip
