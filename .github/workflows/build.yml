name: Capacitor Android Full Project & Artifact v4

on:
  push:
    branches:
      - main

jobs: 
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Repo çek
      - name: Checkout repository
        uses: actions/checkout@v3

      # 🟢 Java 21 kurulumu (ÖNEMLİ)
      - name: Setup Java 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      # 🟢 Node.js kurulumu
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 📦 Bağımlılıkları yükle
      - name: Install dependencies
        run: npm install --force


      # ⚡ Capacitor CLI güncel
      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli@latest

      # 🔄 Capacitor sync yap
      - name: Sync Capacitor
        run: npx cap sync

      # 📁 Web içeriğini Android’e kopyala
      - name: Copy web to Android
        run: npx cap copy android

      # 🔧 Android için Java version ayarı
      - name: Set Java version for Android
        run: |
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "Using Java version:"
          java -version

      # 🔧 gradlew executable yap
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 🤖 Android Debug APK üret (Java 21 ile)
      - name: Build Android Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --warning-mode all

      # 📤 Debug APK’yı Artifact olarak yükle
      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
