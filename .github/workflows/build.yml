name: Capacitor Android Build & Artifact v4

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Repo çek
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Node.js kurulumu
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Bağımlılıkları yükle
      - name: Install dependencies
        run: npm install --force

      # 4️⃣ Capacitor CLI güncel
      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli@latest

      # 5️⃣ Android platformunu ekle (sadece ekli değilse)
      - name: Add Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platformu zaten mevcut."
          fi

      # 6️⃣ Web içeriğini Android’e kopyala
      - name: Copy web to Android
        run: npx cap copy android

      # 7️⃣ Android Debug APK üret
      - name: Build Android Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      # 8️⃣ Debug APK’yı Artifact olarak yükle
      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
