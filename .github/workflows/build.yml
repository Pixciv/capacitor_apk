name: Unpack Full Repo

on:
  workflow_dispatch:

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl tar

      - name: Download full repo tar.gz from Google Drive
        run: |
          FILE_ID="1SU8ystnoZsl4WgJkR2v8eGrfG9mlE1AG"
          FILE_NAME="capacitor_apk_full.tar.gz"
          echo "Downloading $FILE_NAME from Google Drive..."
          curl -L -o $FILE_NAME "https://drive.google.com/uc?export=download&id=$FILE_ID"

      - name: Unpack the tar.gz
        run: |
          mkdir -p temp_unpack
          tar -xzf capacitor_apk_full.tar.gz -C temp_unpack
          if [ -d temp_unpack/capacitor_apk ]; then
              mv temp_unpack/capacitor_apk/* ./
          else
              mv temp_unpack/* ./
          fi
          rm -rf temp_unpack

      - name: List unpacked files
        run: tree -L 4
