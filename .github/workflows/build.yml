name: Capacitor Build & Artifact v4

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Kodunuzu çek
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Node.js kurulumu
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Bağımlılıkları yükle
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Web build
      - name: Build web
        run: npm run build

      # 5️⃣ Capacitor ile web dosyalarını native projeye kopyala
      - name: Copy web to Android
        run: npx cap copy android

      # 6️⃣ Android Debug APK üret
      - name: Build Android Debug APK
        run: cd android && ./gradlew assembleDebug

      # 7️⃣ Debug APK'yı Artifact olarak yükle (v4)
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # 8️⃣ Web build'ini de artifact olarak yükle
      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/
