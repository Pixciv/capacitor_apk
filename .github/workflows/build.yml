name: Capacitor Android Full Project & Artifact v4

on:
  push:
    branches:
      - main

jobs: 
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Java 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Node.js Mobile plugin (Capacitor 7 compatible)
        run: |
          npm install https://github.com/hampoelz/capacitor-nodejs/releases/download/v1.0.0-beta.9/capacitor-nodejs.tgz --legacy-peer-deps
          npx cap sync

      - name: Prepare Node.js project for embedding
        run: |
          mkdir -p www/nodejs
          cp -R node_modules www/nodejs/

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli@latest

      - name: Sync Capacitor
        run: npx cap sync

      - name: Copy web to Android
        run: npx cap copy android

      - name: Set Java version for Android
        run: |
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "Using Java version:"
          java -version

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --warning-mode all

      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

