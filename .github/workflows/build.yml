name: Capacitor Android Build & Artifact v4

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --force

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli@latest

      - name: Initialize Capacitor (if needed)
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init "PDF Reader" "com.arvinapp.pdfreader"
          fi

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platformu zaten mevcut."
          fi

      - name: Copy www to Android
        run: npx cap copy android

      - name: Build Android Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
